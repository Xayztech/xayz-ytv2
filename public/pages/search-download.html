<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XAYZ YT — Search + Download</title>
<link rel="stylesheet" href="/assets/css/global.css">
<style>
.search-hero { padding: 80px 0 32px; text-align: center; }
.search-row { display: flex; gap: 10px; max-width: 640px; margin: 0 auto 40px; }
.results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 20px; margin-top: 24px; }
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  transition: var(--transition);
  animation: fadeUp 0.45s ease both;
}
.result-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.1); }
.result-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; position: relative; }
.result-thumb img { width: 100%; height: 100%; object-fit: cover; }
.result-duration { position: absolute; bottom: 6px; right: 8px; background: rgba(0,0,0,0.8); color: #fff; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; padding: 2px 7px; border-radius: 4px; }
.result-body { padding: 14px; }
.result-title { font-weight: 600; font-size: 0.88rem; color: var(--text); margin-bottom: 5px; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
.result-channel { font-size: 0.75rem; color: var(--accent); margin-bottom: 8px; }
.result-stats { display: flex; gap: 10px; font-size: 0.7rem; color: var(--text3); flex-wrap: wrap; margin-bottom: 10px; }
.result-stats span { display: flex; align-items: center; gap: 3px; }
.dl-panel { border-top: 1px solid var(--border); padding: 12px 14px; background: var(--bg2); }
.dl-panel-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
.fmt-toggle { display: flex; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
.fmt-toggle button {
  padding: 5px 12px;
  background: none;
  border: none;
  color: var(--text2);
  cursor: pointer;
  font-size: 0.75rem;
  font-family: 'Orbitron', sans-serif;
  transition: var(--transition);
}
.fmt-toggle button.active { background: var(--accent); color: #fff; }
.qual-sel { flex: 1; min-width: 90px; }
.dl-btns { display: flex; gap: 6px; }
.dl-btns .btn { font-size: 0.75rem; padding: 7px 10px; flex: 1; }
</style>
</head>
<body>
<header class="topbar">
  <a href="/xayz/home" class="topbar-logo">XAYZ <span>YT</span></a>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</header>
<div class="drawer-overlay" id="drawer-overlay"></div>
<nav class="drawer" id="drawer">
  <div class="drawer-label">Navigation</div>
  <div class="drawer-nav">
    <a href="/xayz/home"><span class="icon">🏠</span> Home</a>
    <a href="/xayz/search"><span class="icon">🔍</span> Search</a>
    <a href="/xayz/search+download"><span class="icon">⚡</span> Search + Download</a>
  </div>
  <div class="drawer-label">API</div>
  <div class="drawer-nav">
    <a href="/xayz/yt/docs"><span class="icon">📚</span> Docs</a>
    <a href="/xayz/yt/tutorial"><span class="icon">🎓</span> Tutorial</a>
    <a href="/xayz/yt/apikey"><span class="icon">🔑</span> Get API Key</a>
    <a href="/xayz/yt/cek-apikey"><span class="icon">✅</span> Cek API Key</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="container">
    <div class="search-hero">
      <div style="display:inline-flex;gap:8px;margin-bottom:16px;">
        <span class="chip chip-accent">⚡ SEARCH + DOWNLOAD</span>
        <span class="chip chip-gold">ALL IN ONE</span>
      </div>
      <h1 class="section-title">Cari & Download Sekaligus</h1>
      <p class="section-sub">Cari video, pilih format & kualitas, langsung download</p>
      <div class="search-row">
        <input type="text" class="input" id="q-input" placeholder="Masukkan kata kunci...">
        <button class="btn btn-primary" onclick="doSearch()">⚡ Search!</button>
      </div>
    </div>

    <div id="loading-box" class="loading-box" style="display:none;">
      <div class="spin"></div><p>Mencari video...</p>
    </div>

    <div id="results-grid" class="results-grid"></div>
    <div class="glow-line"></div>
    <div id="json-wrap"></div>
  </div>
</div>

<script src="/assets/js/global.js"></script>
<script>
document.getElementById('q-input').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

const audioQ = [92,128,256,320];
const videoQ = [144,360,480,720,1080];

function buildCard(v, i) {
  const vid = v.videoId;
  const yturl = `https://youtu.be/${vid}`;
  const id = `card-${i}`;
  return `
  <div class="result-card" id="${id}">
    <div class="result-thumb" style="position:relative;">
      <img src="${v.thumbnail||''}" alt="" loading="lazy">
      <span class="result-duration">${v.timestamp||'—'}</span>
    </div>
    <div class="result-body">
      <div class="result-title">${escapeHtml(v.title||'—')}</div>
      <div class="result-channel">📺 ${escapeHtml(v.author?.name||'—')}</div>
      <div class="result-stats">
        <span>👁 ${Number(v.views||0).toLocaleString('id')}</span>
        <span>⏱ ${v.timestamp||'—'}</span>
        ${v.ago?`<span>📅 ${v.ago}</span>`:''}
      </div>
    </div>
    <div class="dl-panel">
      <div class="dl-panel-row">
        <div class="fmt-toggle">
          <button class="active" id="${id}-mp4" onclick="switchFmt('${id}','mp4','${yturl}')">MP4</button>
          <button id="${id}-mp3" onclick="switchFmt('${id}','mp3','${yturl}')">MP3</button>
        </div>
        <select class="input qual-sel" id="${id}-qual"></select>
      </div>
      <div class="dl-btns">
        <button class="btn btn-ghost" onclick="copyText('${yturl}','Link Disalin!')">📋 Copy</button>
        <a href="${yturl}" target="_blank" class="btn btn-ghost">▶ VOnline</a>
        <button class="btn btn-gold" onclick="dlCard('${id}','${yturl}')">⬇ Download</button>
      </div>
    </div>
  </div>`;
}

function switchFmt(id, fmt, url) {
  const arr = fmt === 'mp3' ? audioQ : videoQ;
  const def = fmt === 'mp3' ? 128 : 360;
  const sel = document.getElementById(`${id}-qual`);
  sel.innerHTML = arr.map(q => `<option value="${q}"${q===def?' selected':''}>${fmt==='mp3'?q+'kbps':q+'p'}</option>`).join('');
  document.getElementById(`${id}-mp4`).classList.toggle('active', fmt==='mp4');
  document.getElementById(`${id}-mp3`).classList.toggle('active', fmt==='mp3');
  sel.dataset.fmt = fmt;
}

function dlCard(id, url) {
  const sel = document.getElementById(`${id}-qual`);
  const qual = sel.value;
  const fmt = sel.dataset.fmt || 'mp4';
  window.location.href = `/xayz-yt/sys/cdn-download/${fmt}/${qual}?url=${encodeURIComponent(url)}`;
}

async function doSearch() {
  const q = document.getElementById('q-input').value.trim();
  if(!q){ toast('Masukkan kata kunci!','error'); return; }
  document.getElementById('loading-box').style.display = 'flex';
  document.getElementById('results-grid').innerHTML = '';

  try {
    const data = await apiCall('search', { q });
    document.getElementById('loading-box').style.display = 'none';
    if(!data.status) throw new Error(data.message);

    const grid = document.getElementById('results-grid');
    grid.innerHTML = (data.results||[]).slice(0,30).filter(v=>v.videoId).map((v,i)=>buildCard(v,i)).join('');

    // Init selects
    (data.results||[]).slice(0,30).forEach((v,i)=>{
      if(!v.videoId) return;
      const id = `card-${i}`;
      switchFmt(id,'mp4',`https://youtu.be/${v.videoId}`);
    });

    if(!data.results?.length) grid.innerHTML='<p style="color:var(--text2);text-align:center;padding:40px;">Tidak ada hasil.</p>';
    renderJsonBox(document.getElementById('json-wrap'), data);
  } catch(err) {
    document.getElementById('loading-box').style.display = 'none';
    toast('Error: '+err.message,'error');
  }
}
</script>
</body>
</html>
